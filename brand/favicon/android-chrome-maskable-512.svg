<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#fbf8f2"/>
  <!-- Safe zone is a circle of radius ~205 centered on the canvas (40% of width) -->
  <g transform="translate(166 166)">
    <path d="M0 0 L0 180 L180 180 Z" fill="#c8862c"/>
    <rect x="0" y="0" width="180" height="180" rx="30" fill="none" stroke="#1d1a14" stroke-width="14"/>
    <path d="M0 0 L180 180" stroke="#1d1a14" stroke-width="14" stroke-linecap="square"/>
  </g>
</svg>
