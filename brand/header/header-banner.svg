<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 320" width="1600" height="320">
  <rect width="1600" height="320" fill="#fbf8f2"/>

  <!-- Wordmark, left -->
  <g transform="translate(96 116)">
    <path d="M0 0 L0 60 L60 60 Z" fill="#c8862c"/>
    <rect x="0" y="0" width="60" height="60" rx="8" fill="none" stroke="#1d1a14" stroke-width="3.5"/>
    <path d="M0 0 L60 60" stroke="#1d1a14" stroke-width="3.5" stroke-linecap="square"/>
  </g>
  <text
    x="180" y="172"
    font-family="Source Serif 4, Georgia, serif"
    font-size="48"
    font-weight="600"
    letter-spacing="-0.48"
    fill="#1d1a14"
  >Everything Agents</text>

  <!-- Spectrum motif on the right: hairline axis with a single amber pip in the middle (echoes the home page hero) -->
  <g transform="translate(960 160)">
    <line x1="0" y1="0" x2="544" y2="0" stroke="#1d1a14" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#1d1a14" stroke-width="1.5"/>
    <line x1="544" y1="-8" x2="544" y2="8" stroke="#1d1a14" stroke-width="1.5"/>
    <circle cx="272" cy="0" r="14" fill="none" stroke="#c8862c" stroke-width="1" opacity="0.3"/>
    <circle cx="272" cy="0" r="9" fill="none" stroke="#c8862c" stroke-width="1" opacity="0.55"/>
    <circle cx="272" cy="0" r="5" fill="#c8862c" stroke="#c8862c" stroke-width="1.5"/>
    <text x="0" y="32" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.6" fill="#5a544a">FREE-ROAM</text>
    <text x="544" y="32" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="0.6" fill="#5a544a">FULLY SCRIPTED</text>
    <text x="272" y="-22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#1d1a14">guided determinism</text>
  </g>

  <!-- Bottom hairline -->
  <line x1="96" y1="280" x2="1504" y2="280" stroke="#dfd6c5" stroke-width="1"/>
</svg>
